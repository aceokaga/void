<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID Browser</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000000;
    --surface: #0a0a0a;
    --surface2: #0f0f0f;
    --surface3: #181010;
    --surface4: #1e1010;
    --border: #1c1010;
    --border2: #2a1515;
    --accent: #ff2222;
    --accent-dim: rgba(255,34,34,0.12);
    --accent-glow: rgba(255,34,34,0.07);
    --text: #eeeeee;
    --text-dim: #666;
    --text-muted: #2e2020;
    --tab-h: 36px;
    --bar-h: 48px;
    --radius: 5px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  #tab-bar {
    display: flex;
    align-items: flex-end;
    background: var(--black);
    padding: 5px 6px 0;
    gap: 2px;
    min-height: calc(var(--tab-h) + 5px);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  #tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    height: var(--tab-h);
    padding: 0 10px 0 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: var(--radius) var(--radius) 0 0;
    cursor: pointer;
    min-width: 130px;
    max-width: 200px;
    flex-shrink: 0;
    transition: background 0.1s;
    position: relative;
  }
  .tab:hover { background: var(--surface3); }
  .tab.active {
    background: var(--surface);
    border-color: var(--border2);
    border-bottom: 1px solid var(--surface);
    margin-bottom: -1px;
    z-index: 2;
  }
  .tab.active::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    border-radius: var(--radius) var(--radius) 0 0;
    box-shadow: 0 0 8px rgba(255,34,34,0.5);
  }

  .tab-favicon { width: 13px; height: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .tab-title {
    font-size: 11.5px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    flex: 1;
  }
  .tab.active .tab-title { color: var(--text); }

  .tab-close {
    width: 15px; height: 15px;
    border-radius: 3px;
    background: transparent; border: none;
    color: #3a2020; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; line-height: 1; flex-shrink: 0;
    transition: background 0.1s, color 0.1s;
  }
  .tab-close:hover { background: rgba(255,34,34,0.15); color: var(--accent); }

  #new-tab-btn {
    height: var(--tab-h); width: 32px;
    background: transparent; border: 1px solid transparent;
    border-radius: var(--radius) var(--radius) 0 0;
    color: #3a2020; cursor: pointer; font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: color 0.1s, background 0.1s;
  }
  #new-tab-btn:hover { color: var(--accent); background: var(--accent-glow); }

  #nav-bar {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    height: var(--bar-h);
  }

  .nav-btn {
    width: 30px; height: 30px;
    background: transparent; border: 1px solid transparent;
    border-radius: var(--radius);
    color: #3a2020; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.1s, background 0.1s, border-color 0.1s;
    flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { color: var(--accent); background: var(--accent-glow); border-color: var(--border2); }
  .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }
  .nav-btn svg { width: 15px; height: 15px; }
  .nav-btn.press { transform: scale(0.88); }

  #url-bar-wrap { flex: 1; position: relative; display: flex; align-items: center; }

  #url-bar {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    padding: 6px 36px 6px 34px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #url-bar:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(255,34,34,0.2), 0 0 18px rgba(255,34,34,0.05);
  }
  #url-bar::placeholder { color: #2a1818; }
  #url-bar::selection { background: rgba(255,34,34,0.2); }

  .url-icon { position: absolute; left: 10px; color: #2e2020; pointer-events: none; display: flex; }
  .url-icon svg { width: 14px; height: 14px; }

  #go-btn {
    position: absolute; right: 6px;
    background: transparent; border: none;
    color: #2e2020; cursor: pointer;
    display: flex; padding: 4px; border-radius: 4px;
    transition: color 0.1s, background 0.1s;
  }
  #go-btn:hover { color: var(--accent); background: var(--accent-glow); }
  #go-btn svg { width: 14px; height: 14px; }

  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%; background: #2e2020;
    flex-shrink: 0; transition: background 0.2s;
  }
  .status-dot.loading { background: #ff8800; animation: pd 0.7s ease-in-out infinite; }
  .status-dot.ok { background: var(--accent); }
  .status-dot.err { background: #ff2222; }
  @keyframes pd { 0%,100%{opacity:1} 50%{opacity:0.25} }

  #content { flex: 1; position: relative; overflow: hidden; background: var(--black); }

  .browser-frame { position: absolute; inset: 0; display: none; flex-direction: column; }
  .browser-frame.active { display: flex; }
  .browser-frame iframe { flex: 1; width: 100%; border: none; background: #fff; }

  #progress-bar {
    position: absolute; top: 0; left: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), rgba(255,80,80,0.5));
    width: 0%; z-index: 100; pointer-events: none;
    box-shadow: 0 0 10px rgba(255,34,34,0.6);
    display: none; will-change: width;
  }

  .new-tab-page {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 36px; background: var(--black); padding: 40px;
  }
  .void-logo { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .void-wordmark {
    font-family: 'Syne', sans-serif; font-size: 56px; font-weight: 700;
    letter-spacing: 0.2em; color: var(--text);
    text-shadow: 0 0 40px rgba(255,34,34,0.15);
  }
  .void-wordmark span { color: var(--accent); text-shadow: 0 0 20px rgba(255,34,34,0.5); }
  .void-sub {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.35em; color: #2a1818; text-transform: uppercase;
  }

  .nt-search-wrap { display: flex; align-items: center; width: 100%; max-width: 540px; position: relative; }
  .nt-search {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 7px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    padding: 13px 46px 13px 16px; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .nt-search:focus { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(255,34,34,0.2), 0 0 30px rgba(255,34,34,0.06); }
  .nt-search::placeholder { color: #2a1818; }
  .nt-go {
    position: absolute; right: 10px;
    background: transparent; border: none; color: #3a2020; cursor: pointer;
    display: flex; padding: 6px; border-radius: 5px; transition: color 0.1s, background 0.1s;
  }
  .nt-go:hover { color: var(--accent); background: var(--accent-glow); }
  .nt-go svg { width: 17px; height: 17px; }

  .quick-links { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 540px; }
  .ql {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; cursor: pointer;
    transition: background 0.1s, border-color 0.1s, transform 0.1s;
    min-width: 76px; text-decoration: none;
  }
  .ql:hover { background: var(--surface3); border-color: var(--border2); transform: translateY(-2px); }
  .ql-icon { font-size: 18px; }
  .ql-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }

  #status-bar {
    height: 20px; background: var(--black);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 10px; gap: 8px;
  }
  #status-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #2a1818; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  #status-right { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #2a1818; flex-shrink: 0; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface4); border-radius: 3px; }
</style>
</head>
<body>

<div id="tab-bar">
  <button id="new-tab-btn" title="New Tab (Ctrl+T)" onclick="newTab()">+</button>
</div>

<nav id="nav-bar">
  <button class="nav-btn" id="btn-back" title="Back (Alt+←)" onclick="navBack()" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="nav-btn" id="btn-fwd" title="Forward (Alt+→)" onclick="navForward()" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <button class="nav-btn" id="btn-reload" title="Reload (F5)" onclick="navReload()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
  </button>
  <div id="url-bar-wrap">
    <span class="url-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </span>
    <input id="url-bar" type="text" placeholder="Search or enter address…"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      onkeydown="urlKd(event)" onfocus="this.select()">
    <button id="go-btn" title="Go" onclick="navigate()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>
  <div class="status-dot" id="sdot"></div>
</nav>

<div id="content">
  <div id="progress-bar"></div>
</div>

<div id="status-bar">
  <span id="status-text">void://newtab</span>
  <span id="status-right">VOID</span>
</div>

<script>
// ── Multiple proxies — tried in order, first success wins
const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

// ── Cached DOM refs
const D = {
  tabBar:   document.getElementById('tab-bar'),
  newTabBtn:document.getElementById('new-tab-btn'),
  urlBar:   document.getElementById('url-bar'),
  btnBack:  document.getElementById('btn-back'),
  btnFwd:   document.getElementById('btn-fwd'),
  btnRld:   document.getElementById('btn-reload'),
  content:  document.getElementById('content'),
  progress: document.getElementById('progress-bar'),
  sdot:     document.getElementById('sdot'),
  stTxt:    document.getElementById('status-text'),
};

let tabs = [], activeId = null, tabCtr = 0;
const aborts = {}; // AbortControllers per tab

const mkTab = (url='') => ({ id: ++tabCtr, url, title: url ? 'Loading…' : 'New Tab', hist: url?[url]:[], hidx: url?0:-1 });
const getTab = id => tabs.find(t => t.id === id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const hostname = url => { try { return new URL(url).hostname; } catch { return url; } };
const fav = t => `<span style="font-size:10px;color:#4a2020;font-family:monospace">${(t||'N')[0].toUpperCase()}</span>`;

// ── Render tabs with DocumentFragment (minimal reflow)
function renderTabs() {
  D.tabBar.querySelectorAll('.tab').forEach(e => e.remove());
  const frag = document.createDocumentFragment();
  for (const tab of tabs) {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeId ? ' active' : '');
    el.dataset.id = tab.id;
    el.innerHTML =
      `<span class="tab-favicon">${fav(tab.title)}</span>` +
      `<span class="tab-title">${esc(tab.title)}</span>` +
      `<button class="tab-close">×</button>`;
    el.addEventListener('click', e => { if (!e.target.classList.contains('tab-close')) switchTab(tab.id); });
    el.querySelector('.tab-close').addEventListener('click', e => { e.stopPropagation(); closeTab(tab.id); });
    frag.appendChild(el);
  }
  D.tabBar.insertBefore(frag, D.newTabBtn);
}

function switchTab(id) {
  activeId = id;
  D.content.querySelectorAll('.browser-frame').forEach(f => f.classList.toggle('active', +f.dataset.tid === id));
  renderTabs();
  const tab = getTab(id);
  syncNav(tab);
  D.stTxt.textContent = tab?.url || 'void://newtab';
}

function newTab(url) {
  const tab = mkTab(url || '');
  tabs.push(tab);
  const frame = document.createElement('div');
  frame.className = 'browser-frame';
  frame.dataset.tid = tab.id;
  D.content.appendChild(frame);
  switchTab(tab.id);
  if (url) loadUrl(tab.id, url, true);
  else { frame.innerHTML = ntHTML(); requestAnimationFrame(() => frame.querySelector('.nt-search')?.focus()); }
}

function closeTab(id) {
  aborts[id]?.abort(); delete aborts[id];
  const idx = tabs.findIndex(t => t.id === id);
  if (idx === -1) return;
  tabs.splice(idx, 1);
  D.content.querySelector(`.browser-frame[data-tid="${id}"]`)?.remove();
  if (!tabs.length) newTab();
  else switchTab(tabs[Math.min(idx, tabs.length-1)].id);
}

function resolveUrl(raw) {
  raw = raw.trim();
  if (!raw) return null;
  if (!raw.includes('.') || raw.includes(' ')) return 'https://www.google.com/search?q=' + encodeURIComponent(raw);
  if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
  try { new URL(raw); return raw; } catch { return null; }
}

function navigate() { const url = resolveUrl(D.urlBar.value); if (url) loadUrl(activeId, url, true); }
function navigateFrom(val) { const url = resolveUrl(val); if (url) loadUrl(activeId, url, true); }
function urlKd(e) { if (e.key === 'Enter') navigate(); if (e.key === 'Escape') e.target.blur(); }
function navBack() { const t = getTab(activeId); if (t && t.hidx > 0) { t.hidx--; loadUrl(t.id, t.hist[t.hidx], false); } }
function navForward() { const t = getTab(activeId); if (t && t.hidx < t.hist.length-1) { t.hidx++; loadUrl(t.id, t.hist[t.hidx], false); } }
function navReload() {
  const t = getTab(activeId); if (!t?.url) return;
  D.btnRld.classList.add('press'); setTimeout(() => D.btnRld.classList.remove('press'), 120);
  loadUrl(t.id, t.url, false);
}

function syncNav(tab) {
  D.btnBack.disabled = !tab || tab.hidx <= 0;
  D.btnFwd.disabled  = !tab || tab.hidx >= tab.hist.length - 1;
  D.urlBar.value     = tab?.url || '';
}

// ── Fast fetch: sequential proxy fallback with abort support
async function fastFetch(url, signal) {
  for (let i = 0; i < PROXIES.length; i++) {
    try {
      const r = await fetch(PROXIES[i](url), { signal, cache: 'default' });
      if (r.ok) return r;
    } catch(e) {
      if (e.name === 'AbortError') throw e;
    }
  }
  throw new Error('All proxies failed');
}

// ── Main load function
async function loadUrl(tabId, url, addHistory) {
  const tab = getTab(tabId);
  if (!tab) return;

  // Cancel previous fetch for this tab
  aborts[tabId]?.abort();
  const ctrl = new AbortController();
  aborts[tabId] = ctrl;

  tab.url = url;
  tab.title = 'Loading…';

  if (addHistory) {
    tab.hist = tab.hist.slice(0, tab.hidx + 1);
    tab.hist.push(url);
    tab.hidx = tab.hist.length - 1;
  }

  if (tabId === activeId) {
    D.urlBar.value = url;
    syncNav(tab);
    dotState('loading');
    D.stTxt.textContent = 'Loading…';
    startProgress();
  }

  const frame = D.content.querySelector(`.browser-frame[data-tid="${tabId}"]`);
  if (!frame) return;

  frame.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;background:#000;flex-direction:column;gap:14px">
    <div style="width:30px;height:30px;border:2px solid #1a0a0a;border-top-color:#ff2222;border-radius:50%;animation:sp .55s linear infinite"></div>
    <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
    <span style="font-family:JetBrains Mono,monospace;font-size:11px;color:#2a1010">fetching…</span>
  </div>`;

  try {
    const r = await fastFetch(url, ctrl.signal);
    const html = await r.text();
    if (ctrl.signal.aborted) return;

    // srcdoc is faster than document.write (no about:blank navigation)
    const iframe = document.createElement('iframe');
    iframe.sandbox = 'allow-scripts allow-same-origin allow-forms allow-popups';
    iframe.srcdoc = rewrite(html, url);
    frame.innerHTML = '';
    frame.appendChild(iframe);

    stopProgress(true);

    // Title extraction after paint (non-blocking)
    requestAnimationFrame(() => setTimeout(() => {
      if (ctrl.signal.aborted) return;
      try { tab.title = iframe.contentDocument?.title || hostname(url); }
      catch { tab.title = hostname(url); }
      if (tabId === activeId) { syncNav(tab); D.stTxt.textContent = url; }
      renderTabs();
      dotState('ok');
    }, 220));

  } catch(err) {
    if (err.name === 'AbortError') return;
    tab.title = 'Error';
    frame.innerHTML = errPage(url, err.message);
    if (tabId === activeId) { syncNav(tab); D.stTxt.textContent = 'Error — ' + err.message; dotState('err'); }
    renderTabs();
    stopProgress(false);
  }
}

// ── HTML rewriter
function rewrite(html, base) {
  const px = PROXIES[0];
  return html
    .replace(/<head([^>]*)>/i, `<head$1><base href="${base}">`)
    .replace(/(href|src|action)="(?!#|javascript:|data:|mailto:|void)([^"]+)"/gi, (m, attr, u) => {
      try { return `${attr}="${px(new URL(u, base).href)}"`; }
      catch { return m; }
    });
}

function errPage(url, msg) {
  return `<div style="flex:1;display:flex;align-items:center;justify-content:center;background:#000;padding:40px">
    <div style="max-width:460px;text-align:center">
      <div style="font-size:44px;margin-bottom:18px">⛔</div>
      <div style="font-family:Syne,sans-serif;font-size:20px;font-weight:700;color:#eee;margin-bottom:8px">Connection Failed</div>
      <div style="font-family:JetBrains Mono,monospace;font-size:11px;color:#3a2020;margin-bottom:16px;word-break:break-all">${esc(url)}</div>
      <div style="font-family:JetBrains Mono,monospace;font-size:11px;color:#ff4444;background:#0a0505;border:1px solid #1c0a0a;border-radius:5px;padding:11px">${esc(msg)}</div>
      <div style="font-family:JetBrains Mono,monospace;font-size:10px;color:#2a1818;margin-top:14px">Some sites block proxy access. Try a different URL.</div>
    </div>
  </div>`;
}

// ── Progress bar (CSS transition, no setInterval)
function startProgress() {
  const b = D.progress;
  b.style.cssText = 'display:block;transition:none;width:0%';
  b.offsetWidth; // force reflow
  b.style.transition = 'width 1.6s cubic-bezier(0.08,0.6,0.35,1)';
  b.style.width = '72%';
}
function stopProgress() {
  const b = D.progress;
  b.style.transition = 'width 0.16s ease';
  b.style.width = '100%';
  setTimeout(() => { b.style.display = 'none'; b.style.width = '0%'; }, 180);
}

function dotState(s) {
  D.sdot.className = 'status-dot ' + s;
  if (s !== 'loading') setTimeout(() => D.sdot.className = 'status-dot', 1800);
}

function ntHTML() {
  return `<div class="new-tab-page">
    <div class="void-logo">
      <div class="void-wordmark">V<span>O</span>ID</div>
      <div class="void-sub">proxy browser</div>
    </div>
    <div class="nt-search-wrap">
      <input class="nt-search" type="text" placeholder="Search or enter URL…"
        autocomplete="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')navigateFrom(this.value)">
      <button class="nt-go" onclick="navigateFrom(this.previousElementSibling.value)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>
    <div class="quick-links">
      <a class="ql" onclick="navigateFrom('https://www.google.com')"><span class="ql-icon">🔍</span><span class="ql-label">Google</span></a>
      <a class="ql" onclick="navigateFrom('https://www.wikipedia.org')"><span class="ql-icon">📖</span><span class="ql-label">Wikipedia</span></a>
      <a class="ql" onclick="navigateFrom('https://github.com')"><span class="ql-icon">🐙</span><span class="ql-label">GitHub</span></a>
      <a class="ql" onclick="navigateFrom('https://news.ycombinator.com')"><span class="ql-icon">🔶</span><span class="ql-label">HN</span></a>
      <a class="ql" onclick="navigateFrom('https://www.reddit.com')"><span class="ql-icon">🤖</span><span class="ql-label">Reddit</span></a>
    </div>
  </div>`;
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 't') { e.preventDefault(); newTab(); }
  if (e.ctrlKey && e.key === 'w') { e.preventDefault(); closeTab(activeId); }
  if (e.ctrlKey && e.key === 'l') { e.preventDefault(); D.urlBar.focus(); }
  if (e.altKey  && e.key === 'ArrowLeft')  { e.preventDefault(); navBack(); }
  if (e.altKey  && e.key === 'ArrowRight') { e.preventDefault(); navForward(); }
  if (e.key === 'F5') { e.preventDefault(); navReload(); }
});

newTab();
</script>
</body>
</html>
